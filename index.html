<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Emilias 3D-Welt</title>
<style>
*{box-sizing:border-box;-webkit-user-select:none;user-select:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#bfe9ff}
canvas{display:block}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:linear-gradient(#ffd9f2,#d9c6ff);z-index:20;color:#74439a;text-align:center;padding:30px}
#loading h1{font-size:clamp(30px,8vw,60px);margin:0 0 10px}
#loading p{font-size:18px}
#hud{position:fixed;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;z-index:5;pointer-events:none}
.badge{background:rgba(255,255,255,.88);padding:10px 16px;border-radius:22px;color:#74439a;font-weight:800;box-shadow:0 4px 15px #0002}
#joystick{position:fixed;left:24px;bottom:28px;width:130px;height:130px;border-radius:50%;background:#fff8;border:3px solid #fff;z-index:7;touch-action:none;box-shadow:0 5px 20px #0002}
#stick{position:absolute;width:58px;height:58px;left:33px;top:33px;border-radius:50%;background:linear-gradient(135deg,#e16bc5,#8d67d5);box-shadow:0 4px 12px #0003}
#hint{position:fixed;bottom:25px;right:20px;background:#fff9;border-radius:20px;padding:10px 14px;color:#6b477f;font-weight:bold;z-index:5}
#message{position:fixed;left:50%;top:90px;transform:translateX(-50%);background:#fff;border-radius:20px;padding:12px 20px;color:#754394;font-weight:bold;z-index:8;opacity:0;transition:.3s;box-shadow:0 5px 20px #0002;white-space:nowrap}
@media (pointer:fine){#joystick{opacity:.72}}
</style>
</head>
<body>
<div id="loading"><h1>🌈 Emilias 3D-Welt</h1><p>Die Spielwelt wird geladen … 👧🏻🐶👩🏻</p></div>
<div id="hud"><div class="badge">👧🏻 Emilia</div><div class="badge">⭐ <span id="stars">0</span> &nbsp; 🪙 <span id="coins">100</span></div></div>
<div id="message"></div>
<div id="joystick"><div id="stick"></div></div>
<div id="hint">Mac: WASD / Pfeile · iPhone: Joystick 🎮</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js';

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x9edfff);
scene.fog=new THREE.Fog(0x9edfff,45,105);

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,200);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.prepend(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff,0x7cba63,2.4));
const sun=new THREE.DirectionalLight(0xffffff,2.8);
sun.position.set(25,35,15); sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
scene.add(sun);

const mat=(color)=>new THREE.MeshStandardMaterial({color,roughness:.8});
function box(w,h,d,color,x,y,z){
 const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat(color));
 m.position.set(x,y,z); m.castShadow=m.receiveShadow=true; scene.add(m); return m;
}
function sphere(r,color,x,y,z){
 const m=new THREE.Mesh(new THREE.SphereGeometry(r,24,18),mat(color));
 m.position.set(x,y,z); m.castShadow=true; scene.add(m); return m;
}

const ground=new THREE.Mesh(new THREE.PlaneGeometry(180,180),mat(0x8fd06b));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

// Wege
box(9,.06,100,0xf4d8ad,0,.03,0);
box(70,.06,7,0xf4d8ad,0,.04,-18);

// Traumhaus
box(16,8,12,0xffd3e8,-19,4,-25);
const roof=new THREE.Mesh(new THREE.ConeGeometry(12,6,4),mat(0xa86892));
roof.position.set(-19,11,-25); roof.rotation.y=Math.PI/4; roof.castShadow=true; scene.add(roof);
box(3,5,.3,0x8e5c4a,-19,2.5,-18.85);
box(3,3,.25,0x9ee8ff,-24,5,-18.8);
box(3,3,.25,0x9ee8ff,-14,5,-18.8);

// Hundeladen
box(15,7,11,0xcab8ff,20,3.5,-25);
box(17,1.2,13,0x8c6ac7,20,7.6,-25);
box(5,4,.3,0x9ee8ff,20,3,-19.35);

// Bäume
function tree(x,z){
 box(1.1,5,1.1,0x8b5a38,x,2.5,z);
 sphere(3.3,0x4f9d52,x,6,z);
 sphere(2.4,0x68b85e,x-2,5.7,z);
 sphere(2.4,0x68b85e,x+2,5.8,z);
}
[[-12,5],[15,7],[-25,8],[28,4],[-32,-8],[34,-12],[-35,-38],[36,-38]].forEach(p=>tree(...p));

// Blumen
for(let i=0;i<35;i++){
 const x=(Math.random()-.5)*75,z=(Math.random()-.5)*75;
 if(Math.abs(x)>7){
   box(.18,.7,.18,0x3f9c52,x,.35,z);
   sphere(.35,[0xff75b5,0xffdf69,0xffffff,0xa87be8][i%4],x,.85,z);
 }
}

// Emilia als 3D-Figur
const player=new THREE.Group();
const skin=mat(0xf2c3a1), hair=mat(0x4b2d24), shirt=mat(0xe783c4), jeans=mat(0x7557b5), white=mat(0xffffff);
const body=new THREE.Mesh(new THREE.CapsuleGeometry(.72,1.3,6,12),shirt); body.position.y=2.25; body.castShadow=true; player.add(body);
const head=new THREE.Mesh(new THREE.SphereGeometry(.78,24,18),skin); head.position.y=3.75; head.castShadow=true; player.add(head);
const hairBack=new THREE.Mesh(new THREE.SphereGeometry(.83,24,18),hair); hairBack.position.set(0,.08,-.18); head.add(hairBack);
const face=new THREE.Mesh(new THREE.SphereGeometry(.7,24,18,0,Math.PI*2,0,Math.PI*.62),skin); face.position.set(0,0,.27); head.add(face);
function eye(x){const e=new THREE.Mesh(new THREE.SphereGeometry(.09,12,8),mat(0x35231f));e.position.set(x,.12,.69);head.add(e)}
eye(-.25);eye(.25);
for(const x of [-.45,.45]){const arm=new THREE.Mesh(new THREE.CapsuleGeometry(.18,1.05,5,8),skin);arm.position.set(x,2.15,0);player.add(arm)}
for(const x of [-.3,.3]){const leg=new THREE.Mesh(new THREE.CapsuleGeometry(.22,1.1,5,8),jeans);leg.position.set(x,.75,0);player.add(leg)}
player.position.set(0,0,15); scene.add(player);

// Polly als kleine Figur am Haus
const polly=new THREE.Group();
const pb=new THREE.Mesh(new THREE.SphereGeometry(1.05,20,16),mat(0xd6a47b));pb.scale.set(1.2,.8,1.45);pb.position.y=1.05;polly.add(pb);
const ph=new THREE.Mesh(new THREE.SphereGeometry(.82,20,16),mat(0xe2b68f));ph.position.set(0,1.65,.95);polly.add(ph);
for(const x of [-.52,.52]){const ear=new THREE.Mesh(new THREE.ConeGeometry(.28,.75,12),mat(0x8d5d43));ear.position.set(x,2.25,.92);ear.rotation.z=x<0?.3:-.3;polly.add(ear)}
polly.position.set(-12,0,-15); scene.add(polly);

camera.position.set(0,9,24);
let keys={},joy={x:0,y:0},velocity=new THREE.Vector3(),walk=0;
addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

const joyEl=document.getElementById('joystick'),stick=document.getElementById('stick');
function joyMove(e){
 const t=e.touches?e.touches[0]:e, r=joyEl.getBoundingClientRect();
 let x=t.clientX-(r.left+r.width/2),y=t.clientY-(r.top+r.height/2);
 const max=42,l=Math.hypot(x,y)||1;if(l>max){x=x/l*max;y=y/l*max}
 joy.x=x/max;joy.y=y/max;stick.style.transform=`translate(${x}px,${y}px)`;
}
function joyEnd(){joy.x=joy.y=0;stick.style.transform='translate(0,0)'}
joyEl.addEventListener('touchstart',joyMove,{passive:false});
joyEl.addEventListener('touchmove',e=>{e.preventDefault();joyMove(e)},{passive:false});
joyEl.addEventListener('touchend',joyEnd);
joyEl.addEventListener('pointerdown',e=>{joyEl.setPointerCapture(e.pointerId);joyMove(e)});
joyEl.addEventListener('pointermove',e=>{if(e.buttons)joyMove(e)});
joyEl.addEventListener('pointerup',joyEnd);

function notify(text){const m=document.getElementById('message');m.textContent=text;m.style.opacity=1;clearTimeout(window.mt);window.mt=setTimeout(()=>m.style.opacity=0,1800)}
let lastZone='';
function zones(){
 let zone='';
 if(player.position.distanceTo(new THREE.Vector3(-19,0,-18))<8)zone='🏡 Willkommen am Traumhaus!';
 if(player.position.distanceTo(new THREE.Vector3(20,0,-19))<8)zone='🐾 Willkommen beim Hundeladen!';
 if(player.position.distanceTo(polly.position)<5)zone='🐶 Polly freut sich, Emilia zu sehen!';
 if(zone&&zone!==lastZone)notify(zone);
 lastZone=zone;
}

const clock=new THREE.Clock();
function animate(){
 requestAnimationFrame(animate);
 const dt=Math.min(clock.getDelta(),.04);
 let x=joy.x+(keys.d||keys.arrowright?1:0)-(keys.a||keys.arrowleft?1:0);
 let z=joy.y+(keys.s||keys.arrowdown?1:0)-(keys.w||keys.arrowup?1:0);
 const len=Math.hypot(x,z);
 if(len>.08){
   x/=Math.max(1,len);z/=Math.max(1,len);
   velocity.x=THREE.MathUtils.lerp(velocity.x,x*8,.18);
   velocity.z=THREE.MathUtils.lerp(velocity.z,z*8,.18);
   player.rotation.y=Math.atan2(velocity.x,velocity.z);
   walk+=dt*10; body.position.y=2.25+Math.sin(walk)*.07;
 }else{
   velocity.x=THREE.MathUtils.lerp(velocity.x,0,.2);
   velocity.z=THREE.MathUtils.lerp(velocity.z,0,.2);
 }
 player.position.x+=velocity.x*dt;player.position.z+=velocity.z*dt;
 player.position.x=THREE.MathUtils.clamp(player.position.x,-43,43);
 player.position.z=THREE.MathUtils.clamp(player.position.z,-48,43);

 const behind=new THREE.Vector3(0,7,11).applyAxisAngle(new THREE.Vector3(0,1,0),player.rotation.y);
 const target=player.position.clone().add(behind);
 camera.position.lerp(target,.07);
 camera.lookAt(player.position.x,2.2,player.position.z);
 zones();
 renderer.render(scene,camera);
}
animate();
document.getElementById('loading').style.display='none';
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
</script>
</body>
</html>
